<!doctype html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanatan Sena | Registration</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hero-band">
      <div class="container nav-row">
        <div class="brand-lockup">
          <img class="logo-image" src="/assets/logo.png" alt="Sanatan Sena Logo" />
          <div>
            <p class="badge">SS • सनातन सेना</p>
            <h1 class="hero-title">सदस्य पंजीकरण</h1>
            <p class="hero-sub">सबका साथ सबका सम्मान</p>
          </div>
        </div>
        <div class="lang-switch" role="group" aria-label="language switch">
          <button id="lang-hi" class="lang-btn active">हिंदी</button>
          <button id="lang-en" class="lang-btn">English</button>
          <a class="admin-link" href="/">Home</a>
        </div>
      </div>
    </header>

    <main class="container main-grid">
      <section class="panel" id="join">
        <h2 class="hi-only">सदस्य पंजीकरण</h2>
        <h2 class="en-only hidden">Member Registration</h2>

        <form id="registration-form" class="form-grid" enctype="multipart/form-data">
          <div class="photo-upload-zone" style="background: rgba(255,153,51,0.05); border: 2px dashed var(--line); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 10px;">
            <label class="file-field" style="cursor: pointer;">
              <span style="display: block; font-size: 0.9rem; margin-bottom: 8px;">सदस्य का फोटो अपलोड करें / Upload Photo</span>
              <input name="photo" type="file" accept="image/*" style="background: white; border-radius: 8px; border: 1px solid var(--line);" />
            </label>
          </div>
          <input name="fullName" placeholder="पूरा नाम / Full Name" required />
          <input name="district" placeholder="जिला / District" required />
          <textarea name="address" placeholder="पूरा पता / Complete Address" required style="min-height: 80px;"></textarea>
          <input name="mobile" placeholder="मोबाइल नंबर / Mobile Number" required />
          <div id="otp-row" class="otp-row hidden" style="background: #fff8ee; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); margin-top: 5px;">
            <input name="otp" placeholder="Enter OTP" style="font-size: 1.2rem; text-align: center; letter-spacing: 4px;" />
            <button type="button" class="btn-secondary" id="resend-otp">Resend OTP</button>
          </div>
          <button type="submit" class="btn-primary" id="submit-btn" style="padding: 15px; font-size: 1.1rem; margin-top: 10px;">Register / पंजीकरण करें</button>
        </form>

        <p id="registration-message" class="status-text"></p>
      </section>

      <section class="panel">
        <h2 class="hi-only">आपका डिजिटल ID कार्ड</h2>
        <h2 class="en-only hidden">Your Digital ID Card</h2>
        <div id="card-output" class="card-output" style="border: none; background: transparent; padding: 0;">
          <div class="muted" style="text-align: center; padding: 40px; border: 2px dashed var(--line); border-radius: 20px;">
            Registration completes here. Your card will appear below instantly.
          </div>
        </div>
        <div class="card-actions hidden" id="card-actions" style="margin-top: 20px; justify-content: center;">
          <button class="btn-primary" id="download-card">Download PDF</button>
          <button class="btn-secondary" id="print-card">Print Card</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>सनातन सेना (SS) • सबका साथ सबका सम्मान</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
